<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Switch</title>
    <link rel="stylesheet" href="lock_switch.css">
</head>
<body>
    <div id="door-status" style="text-align:center; font-size:1.3em; margin-bottom:18px; font-weight:bold; color:#2196F3;">Door Status: <span id="door-state">...</span></div>
    <div class="switch-container">
        <span class="switch-label" id="unlock-label">Unlock</span>
        <label class="switch">
            <input type="checkbox" id="lockSwitch">
            <span class="slider"></span>
        </label>
        <span class="switch-label" id="lock-label">Locked</span>
    </div>
    <div class="switch-container" style="margin-top:18px; width:max-content;">
        <label class="switch" style="margin:0 10px 0 0;">
            <input type="checkbox" id="autoLockToggle" checked>
            <span class="slider"></span>
        </label>
        <span class="switch-label">Enable Auto-Lock (5s)</span>
    </div>
    <script>
        const switchInput = document.getElementById('lockSwitch');
        let updatingFromServer = false;
        let autoLockEnabled = true;
        let autoLockTimer = null;
        const autoLockToggle = document.getElementById('autoLockToggle');

        // Update switch state from server
        function pollV24() {
            fetch('https://blynk.cloud/external/api/get?token=mluK2eRheIpDx6pNKbfHw3V0v8ZOxC8M&v24')
                .then(response => response.text())
                .then(value => {
                    updatingFromServer = true;
                    // v24 returns as string, e.g. "100" or "30"
                    if (value.trim() === "100") {
                        switchInput.checked = true;
                    } else {
                        switchInput.checked = false;
                    }
                    updatingFromServer = false;
                })
                .catch(() => {/* ignore errors for polling */});
        }

        // Auto-lock logic
        // Auto-lock only when door is closed and unlocked
        let lastDoorState = null;
        let prevDoorState = null;
        function startAutoLockTimer() {
            if (!autoLockEnabled) return;
            clearAutoLockTimer();
            // Only start timer if door is closed and unlocked
            if (lastDoorState === "Closed" && !switchInput.checked) {
                autoLockTimer = setTimeout(() => {
                    // Double-check state before locking
                    if (lastDoorState === "Closed" && !switchInput.checked) {
                        updatingFromServer = true;
                        switchInput.checked = true;
                        updatingFromServer = false;
                        triggerLock(true);
                    }
                }, 5000);
            }
        }

        function clearAutoLockTimer() {
            if (autoLockTimer) {
                clearTimeout(autoLockTimer);
                autoLockTimer = null;
            }
        }

        autoLockToggle.addEventListener('change', function() {
            autoLockEnabled = autoLockToggle.checked;
            if (!autoLockEnabled) {
                clearAutoLockTimer();
            }
        });

        function triggerLock(isLock) {
            let url;
            if (isLock) {
                url = "https://blynk.cloud/external/api/update?token=mluK2eRheIpDx6pNKbfHw3V0v8ZOxC8M&v24=100";
            } else {
                url = "https://blynk.cloud/external/api/update?token=mluK2eRheIpDx6pNKbfHw3V0v8ZOxC8M&v24=30";
            }
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        alert('API request failed');
                    }
                })
                .catch(() => alert('Network error'));
            // Log event
            fetch(isLock
                ? "https://blynk.cloud/external/api/logEvent?token=mluK2eRheIpDx6pNKbfHw3V0v8ZOxC8M&code=door_locked"
                : "https://blynk.cloud/external/api/logEvent?token=mluK2eRheIpDx6pNKbfHw3V0v8ZOxC8M&code=door_unlocked"
            ).catch(() => {});
        }

        // Poll door status (v25 assumed for example)
        function pollDoorStatus() {
            fetch('https://blynk.cloud/external/api/get?token=mluK2eRheIpDx6pNKbfHw3V0v8ZOxC8M&V20')
                .then(response => response.text())
                .then(value => {
                    const state = document.getElementById('door-state');
                    const val = value.trim();
                    prevDoorState = lastDoorState;
                    lastDoorState = val;
                    if (val === "Open") {
                        state.textContent = "Open";
                        state.style.color = "#e53935";
                        clearAutoLockTimer();
                    } else if (val === "Closed") {
                        state.textContent = "Closed";
                        state.style.color = "#43a047";
                        // Start auto-lock timer only if door just transitioned to closed and is unlocked
                        if (prevDoorState !== "Closed" && !switchInput.checked) {
                            startAutoLockTimer();
                        } else if (switchInput.checked) {
                            clearAutoLockTimer();
                        }
                    } else if (val === "Error") {
                        state.textContent = "Error";
                        state.style.color = "#757575";
                        clearAutoLockTimer();
                    } else {
                        state.textContent = "Unknown";
                        state.style.color = "#757575";
                        clearAutoLockTimer();
                    }
                })
                .catch(() => {
                    const state = document.getElementById('door-state');
                    state.textContent = "Error";
                    state.style.color = "#757575";
                    clearAutoLockTimer();
                });
        }
        setInterval(pollV24, 1000); // Poll every 1 second
        setInterval(pollDoorStatus, 1000); // Poll door status every 1 second
        pollV24(); // Initial poll
        pollDoorStatus(); // Initial poll

        switchInput.addEventListener('change', function() {
            if (updatingFromServer) return; // Prevent loop
            if (switchInput.checked) {
                // ON: Locked
                triggerLock(true);
                clearAutoLockTimer();
            } else {
                // OFF: Unlock
                triggerLock(false);
                // Do not start timer here; handled by door close event
            }
        });

        // No need to start auto-lock timer on load; handled by pollDoorStatus
    </script>
</body>
</html>
