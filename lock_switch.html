<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Switch</title>
    <link rel="stylesheet" href="lock_switch.css">
</head>
<body>
    <div id="door-status" style="text-align:center; font-size:1.3em; margin-bottom:18px; font-weight:bold; color:#2196F3;">Door Status: <span id="door-state">...</span></div>
    <div class="switch-container">
        <span class="switch-label" id="unlock-label">Unlock</span>
        <label class="switch">
            <input type="checkbox" id="lockSwitch">
            <span class="slider"></span>
        </label>
        <span class="switch-label" id="lock-label">Locked</span>
    </div>
    <div class="switch-container" style="margin-top:18px; width:max-content;">
        <label class="switch" style="margin:0 10px 0 0;">
            <input type="checkbox" id="autoLockToggle" checked>
            <span class="slider"></span>
        </label>
        <span class="switch-label">Enable Auto-Lock (5s)</span>
    </div>
    <script src="js/lock_switch.js"></script>
</body>
</html>
